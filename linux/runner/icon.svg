<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#94A3B8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="ringStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4DD0E1" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="wave1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="wave2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="wave3" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#4DD0E1" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="shadowLg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="particleBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="510" height="510" x="1" y="1" rx="115" fill="url(#bgGradient)" stroke="url(#ringStroke)" stroke-width="2"/>

  <circle cx="120" cy="140" r="5" fill="#4DD0E1" filter="url(#particleBlur)" opacity="0.6"/>
  <circle cx="400" cy="180" r="7" fill="#69F0AE" filter="url(#particleBlur)" opacity="0.5"/>
  <circle cx="100" cy="380" r="8" fill="#38BDF8" filter="url(#particleBlur)" opacity="0.3"/>
  <circle cx="380" cy="420" r="4" fill="#ffffff" filter="url(#particleBlur)" opacity="0.7"/>
  <circle cx="256" cy="80" r="6" fill="#38BDF8" filter="url(#particleBlur)" opacity="0.4"/>

  <circle cx="256" cy="256" r="200" fill="url(#centerGlow)"/>

  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#glassRing)" stroke-width="60" filter="url(#shadowLg)"/>

  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ringStroke)" stroke-width="2" opacity="0.8"/>
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#ringStroke)" stroke-width="2" opacity="0.5"/>

  <path d="M 136 256 A 120 120 0 1 0 256 136" fill="none" stroke="url(#wave1)" stroke-width="60" stroke-linecap="round" filter="url(#shadowSm)"/>

  <path d="M 341 171 A 120 120 0 0 0 152 316" fill="none" stroke="url(#wave2)" stroke-width="60" stroke-linecap="round" filter="url(#shadowSm)"/>

  <path d="M 341 341 A 120 120 0 0 1 136 256" fill="none" stroke="url(#wave3)" stroke-width="36" stroke-linecap="round" filter="url(#shadowSm)"/>

  <path d="M 341 171 A 120 120 0 0 0 152 316" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M 341 341 A 120 120 0 0 1 136 256" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>
